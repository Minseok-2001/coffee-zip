# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# Datasource - MySQL (prod/dev)
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:}
quarkus.datasource.password=${DB_PASSWORD:}
quarkus.datasource.jdbc.url=${DB_URL:}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.sql-load-script=import.sql
# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://coffeezip.app}
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=accessToken

# JWT token expiry
coffeezip.jwt.access-token-expiry=3600
coffeezip.jwt.refresh-token-expiry=2592000

# OAuth - Google
coffeezip.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
coffeezip.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
coffeezip.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback}

# Test profile - H2
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:coffeezip;DB_CLOSE_DELAY=-1;MODE=MySQL
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
# OAuth - test dummy values (not actually called in tests)
%test.coffeezip.oauth.google.client-id=test-google-id
%test.coffeezip.oauth.google.client-secret=test-google-secret
%test.coffeezip.oauth.kakao.client-id=test-kakao-id
%test.coffeezip.oauth.kakao.client-secret=test-kakao-secret

# Dev profile - RDS 연결 (.env 파일에서 환경변수 읽음)
%dev.quarkus.datasource.db-kind=mysql
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coffeezip}?serverTimezone=UTC&characterEncoding=UTF-8
%dev.quarkus.datasource.username=${DB_USERNAME:sa}
%dev.quarkus.datasource.password=${DB_PASSWORD:}
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.sql-load-script=no-file
# OAuth dev — .env 파일에서 읽음 (더미값 제거)
