# Datasource - MySQL (prod/dev)
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:coffeezip}
quarkus.datasource.password=${DB_PASSWORD:coffeezip}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://localhost:3306/coffeezip?serverTimezone=UTC&characterEncoding=UTF-8}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.sql-load-script=import.sql

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://coffeezip.app}
smallrye.jwt.sign.key.location=privateKey.pem

# JWT token expiry
coffeezip.jwt.access-token-expiry=3600
coffeezip.jwt.refresh-token-expiry=2592000

# OAuth - Google
coffeezip.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
coffeezip.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
coffeezip.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}

# OAuth - Kakao
coffeezip.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
coffeezip.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
coffeezip.oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8080/auth/kakao/callback}

# Test profile - H2
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:coffeezip;DB_CLOSE_DELAY=-1;MODE=MySQL
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql

# Dev profile
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:coffeezip;DB_CLOSE_DELAY=-1;MODE=MySQL
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
